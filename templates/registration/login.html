{% extends "base.html" %}
{% load static %}

{% block title %}Entrar — Plataforma Trilhos{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <img src="{% static 'desgaste/img/logo.png' %}" alt="Logo" class="login-logo">

        <h1 class="login-title">Plataforma Trilhos</h1>
        <p class="login-subtitle">Faça login para continuar</p>

        {% if form.errors %}
        <div class="login-error">Usuário ou senha inválidos. Tente novamente.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="field-group">
                <label for="id_username">Usuário</label>
                <input
                    type="text"
                    id="id_username"
                    name="username"
                    autofocus
                    autocomplete="username"
                    required
                >
            </div>

            <div class="field-group">
                <label for="id_password">Senha</label>
                <input
                    type="password"
                    id="id_password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </div>
</div>

<style>
    .login-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
    }

    .login-logo {
        display: block;
        max-width: 180px;
        height: auto;
        margin: 0 auto 24px;
    }

    .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 40px 36px;
        width: 100%;
        max-width: 400px;
    }

    .login-title {
        margin: 0 0 6px;
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--primary);
        text-align: center;
    }

    .login-subtitle {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 0.95rem;
        text-align: center;
    }

    .login-error {
        background: #fde8e8;
        border: 1px solid #f5c6c6;
        border-radius: var(--radius-sm);
        color: #b91c1c;
        font-size: 0.875rem;
        padding: 10px 14px;
        margin-bottom: 20px;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 18px;
    }

    .field-group label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
    }

    .field-group input {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 1rem;
        padding: 10px 14px;
        color: var(--text);
        background: var(--surface-soft);
        transition: border-color 0.2s;
        outline: none;
    }

    .field-group input:focus {
        border-color: var(--primary);
        background: var(--surface);
    }

    .login-card button[type="submit"] {
        width: 100%;
        margin-top: 8px;
    }
</style>
{% endblock %}
