{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Projeto Desgaste de Trilhos{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'desgaste/css/style.css' %}">
</head>
<body>
    <div class="app-shell">

        {% if user.is_authenticated %}
        <div class="topbar">
            <div class="topbar-logo">
                <img src="{% static 'desgaste/img/logo.png' %}" alt="Logo" class="topbar-logo-img">
            </div>
            <div class="topbar-user">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                     viewBox="0 0 24 24" fill="none" stroke="var(--muted)"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-label="Usuário">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                <form method="post" action="{% url 'logout' %}" style="margin:0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-ghost btn-sm">Sair</button>
                </form>
            </div>
        </div>
        {% endif %}

        {% block page_actions %}{% endblock %}
        {% block content %}{% endblock %}
    </div>
    {% block page_scripts %}{% endblock %}
</body>
</html>
